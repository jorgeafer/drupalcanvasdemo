global:
  version: '1.0'
  css:
    theme:
      css/tibidabo.css: {}
  js:
    js/tibidabo.js: { minified: false }
  dependencies:
    - core/drupal
    - core/once

# Loaded automatically when the header component is rendered.
component.header:
  version: '1.0'
  js:
    components/header/header.js: { minified: false }
  dependencies:
    - core/drupal
    - core/once

# Loaded automatically when the hero-carousel component is rendered.
component.hero-carousel:
  version: '1.0'
  js:
    components/hero-carousel/hero-carousel.js: { minified: false }
  dependencies:
    - core/drupal
    - core/once

# Loaded automatically when the attractions component is rendered.
component.attractions:
  version: '1.0'
  js:
    components/attractions/attractions.js: { minified: false }
  dependencies:
    - core/drupal
    - core/once
